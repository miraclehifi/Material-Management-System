<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>一分三科面料组智能录入系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<!-- ===== HEADER ===== -->
<header id="main-header">
  <div class="header-inner">
    <div class="logo">
      <i class="fa-solid fa-layer-group"></i>
      <div class="logo-text">
        <span class="logo-main">一分三科面料组</span>
        <span class="logo-sub">智能录入系统</span>
      </div>
    </div>

    <div class="header-center">
      <span id="header-status" class="hstatus idle">
        <i class="fa-solid fa-circle-check"></i> 就绪
      </span>
      <span id="online-count" class="online-badge" title="当前在线人数">
        <i class="fa-solid fa-users"></i> <span id="online-num">1</span>
      </span>
    </div>

    <div class="header-right">
      <button class="hbtn hbtn-ghost" onclick="window.open('mobile.html','_blank')" title="手机端">
        <i class="fa-solid fa-mobile-screen"></i>
        <span class="hbtn-label">手机录入</span>
      </button>
      <button class="hbtn hbtn-ghost" id="btn-history" onclick="openHistory()" title="历史记录">
        <i class="fa-solid fa-clock-rotate-left"></i>
        <span class="hbtn-label">历史</span>
      </button>
      <button class="hbtn hbtn-ghost" onclick="openSettings()" title="系统设置">
        <i class="fa-solid fa-gear"></i>
        <span class="hbtn-label">设置</span>
      </button>
      <div class="header-divider"></div>
      <button class="hbtn hbtn-success" onclick="exportExcel()">
        <i class="fa-solid fa-file-excel"></i>
        <span class="hbtn-label">导出 Excel</span>
      </button>
    </div>
  </div>
</header>

<!-- ===== MAIN WORKSPACE ===== -->
<div id="workspace">

  <!-- LEFT: 图片上传 -->
  <aside id="left-panel">
    <div class="panel-hd">
      <span><i class="fa-solid fa-images"></i> 图片队列</span>
      <span id="img-count-badge" class="badge">0</span>
    </div>

    <div id="drop-zone" class="drop-zone"
         onclick="document.getElementById('file-input').click()">
      <input type="file" id="file-input" accept="image/*" multiple
             style="display:none" onchange="handleFiles(event)"/>
      <i class="fa-solid fa-cloud-arrow-up"></i>
      <p>点击或拖拽上传</p>
      <span>JPG / PNG / WEBP · 可多选</span>
    </div>

    <div id="img-queue" class="img-queue"></div>

    <!-- OCR 设置 -->
    <div class="settings-collapse">
      <button class="collapse-btn" onclick="toggleOCRSettings(this)">
        <i class="fa-solid fa-sliders"></i> 识别设置
        <i class="fa-solid fa-chevron-down collapse-icon"></i>
      </button>
      <div class="collapse-body" style="display:none">
        <label class="sl">操作人</label>
        <input id="operator-name" type="text" class="si" placeholder="请输入姓名" value=""/>
        <label class="sl">OCR 语言</label>
        <select id="ocr-lang" class="si">
          <option value="chi_sim+eng" selected>中文+英文</option>
          <option value="eng">仅英文</option>
        </select>
        <label class="sl">工厂名关键词（每行一个）</label>
        <textarea id="factory-kw" class="si" rows="4">纺织
织造
面料
Textile
有限公司</textarea>
      </div>
    </div>

    <div class="left-footer">
      <button id="btn-ocr-all" class="btn-primary-full" onclick="ocrAll()" disabled>
        <i class="fa-solid fa-wand-magic-sparkles"></i> 全部识别 → 填入表格
      </button>
      <div id="ocr-prog" style="display:none" class="ocr-prog">
        <div class="prog-bar"><div id="prog-fill" class="prog-fill"></div></div>
        <span id="prog-text">准备中...</span>
      </div>
    </div>
  </aside>

  <!-- RIGHT: Excel 表格 -->
  <main id="right-panel">
    <div id="table-toolbar">
      <div class="tl">
        <button class="tbtn" onclick="addEmptyRow()">
          <i class="fa-solid fa-plus"></i> 新增行
        </button>
        <button class="tbtn tbtn-warn" onclick="deleteSelectedRows()">
          <i class="fa-solid fa-trash"></i> 删除选中
        </button>
        <button class="tbtn" onclick="loadFromDB()">
          <i class="fa-solid fa-rotate"></i> 刷新
        </button>
        <span class="tsep"></span>
        <span id="row-count" class="row-count">0 行</span>
        <span id="sync-indicator" class="sync-ind" style="display:none">
          <i class="fa-solid fa-spinner fa-spin"></i> 同步中
        </span>
      </div>
      <div class="tr-hint">
        <i class="fa-solid fa-circle-info"></i>
        单元格直接点击编辑 · H列自动计算 · 数据实时同步
      </div>
    </div>

    <div id="excel-wrap">
      <table id="excel-table">
        <thead>
          <tr>
            <th class="th-sel"><input type="checkbox" id="sel-all" onchange="selAll(this)"/></th>
            <th class="th-img" title="图片">图</th>
            <th class="th-num">#</th>
            <th class="th-col" data-col="B">B<br/><small>面料描述</small></th>
            <th class="th-col" data-col="C">C<br/><small>编号</small></th>
            <th class="th-col th-wide" data-col="D">D<br/><small>成分 Content</small></th>
            <th class="th-col" data-col="E">E<br/><small>规格 Density</small></th>
            <th class="th-col th-sm" data-col="F">F<br/><small>克重</small></th>
            <th class="th-col th-sm" data-col="G">G<br/><small>幅宽(M)</small></th>
            <th class="th-col th-formula" data-col="H">
              <i class="fa-solid fa-lock" style="font-size:8px"></i> H<br/><small>幅宽(英寸)</small>
            </th>
            <th class="th-col" data-col="I">I<br/><small>工厂批号</small></th>
            <th class="th-action"></th>
          </tr>
        </thead>
        <tbody id="excel-body"></tbody>
      </table>
      <div id="empty-hint" class="empty-hint">
        <i class="fa-solid fa-table"></i>
        <p>上传图片并点击「全部识别」自动填表<br/>或点击「新增行」手动录入</p>
      </div>
    </div>

    <!-- 同步日志条 -->
    <div id="log-bar">
      <button class="log-toggle-btn" onclick="toggleLog()">
        <i class="fa-solid fa-terminal"></i> 识别日志
        <span id="log-cnt" class="badge" style="display:none">0</span>
        <i class="fa-solid fa-chevron-up" id="log-chev"></i>
      </button>
      <div id="log-body" class="log-body" style="display:none">
        <div id="log-lines"></div>
      </div>
    </div>
  </main>
</div>

<!-- ===== 历史记录面板 ===== -->
<div id="history-panel" class="side-panel" style="display:none">
  <div class="sp-header">
    <span><i class="fa-solid fa-clock-rotate-left"></i> 历史录入记录</span>
    <button class="sp-close" onclick="closeHistory()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="sp-body" id="history-body">
    <div class="sp-loading"><i class="fa-solid fa-spinner fa-spin"></i> 加载中...</div>
  </div>
</div>

<!-- ===== 设置面板 ===== -->
<div id="settings-panel" class="side-panel" style="display:none">
  <div class="sp-header">
    <span><i class="fa-solid fa-gear"></i> 系统设置</span>
    <button class="sp-close" onclick="closeSettings()"><i class="fa-solid fa-xmark"></i></button>
  </div>
  <div class="sp-body">
    <div class="sp-section">
      <div class="sp-title">Excel 导出设置</div>
      <label class="sp-label">工作表名称</label>
      <input type="text" id="cfg-sheet-name" class="sp-input" value="面料数据库"/>
      <label class="sp-label">导出文件名前缀</label>
      <input type="text" id="cfg-file-prefix" class="sp-input" value="一分三科面料"/>
    </div>
    <div class="sp-section">
      <div class="sp-title">同步设置</div>
      <label class="sp-label">自动刷新间隔（秒）</label>
      <input type="number" id="cfg-sync-interval" class="sp-input" value="15" min="5" max="60"/>
    </div>
    <div class="sp-section">
      <div class="sp-title">图片设置</div>
      <label class="sp-label">缩略图最大尺寸（px）</label>
      <input type="number" id="cfg-thumb-size" class="sp-input" value="120" min="60" max="300"/>
      <label class="sp-label" style="font-size:11px;color:#94a3b8">
        较小值可减少存储压力（建议多人使用时设为80-120）
      </label>
    </div>
    <div class="sp-section">
      <div class="sp-title">成分缩写对照</div>
      <div class="comp-table-mini" id="comp-mini-table"></div>
    </div>
    <div style="padding:16px">
      <button class="btn-primary-full" onclick="saveSettings()">
        <i class="fa-solid fa-floppy-disk"></i> 保存设置
      </button>
    </div>
  </div>
</div>

<!-- ===== 遮罩 ===== -->
<div id="overlay" class="overlay" style="display:none" onclick="closeAllPanels()"></div>

<!-- ===== 图片预览 ===== -->
<div id="img-lightbox" class="lightbox" style="display:none" onclick="closeLightbox()">
  <div class="lb-box" onclick="event.stopPropagation()">
    <img id="lb-img" src="" alt=""/>
    <p id="lb-name"></p>
    <button class="lb-close" onclick="closeLightbox()"><i class="fa-solid fa-xmark"></i></button>
  </div>
</div>

<!-- ===== Toast ===== -->
<div id="toast" class="toast"></div>

<script src="js/ocr-parser.js"></script>
<script src="js/history.js"></script>
<script src="js/sync.js"></script>
<script src="js/app.js"></script>
</body>
</html>
