<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
  <title>一分三科 · 手机录入</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="js/ocr-parser.js"></script>
  <style>
    :root{
      --primary:#2563eb;--primary-d:#1d4ed8;--primary-l:#dbeafe;
      --success:#16a34a;--danger:#dc2626;--border:#e2e8f0;
      --text:#0f172a;--text-2:#475569;--text-3:#94a3b8;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Noto Sans SC',-apple-system,sans-serif;
      background:#f0f4f8;color:var(--text);font-size:14px;
      min-height:100vh;padding-bottom:80px;
    }

    /* Header */
    header{
      background:linear-gradient(135deg,#1e3a8a,#2563eb);
      color:#fff;padding:14px 16px 12px;
      position:sticky;top:0;z-index:100;
      box-shadow:0 2px 12px rgba(30,58,138,.3);
    }
    .m-logo{font-size:15px;font-weight:700}
    .m-logo small{display:block;font-size:10px;opacity:.8;font-weight:400;margin-top:1px}
    .m-hstatus{font-size:11px;margin-top:6px;opacity:.85}

    /* Upload area */
    .m-section{background:#fff;border-radius:12px;margin:12px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .m-title{font-size:13px;font-weight:700;color:var(--text-2);margin-bottom:12px;display:flex;align-items:center;gap:7px}
    .m-title i{color:var(--primary)}

    .m-upload-area{
      border:2px dashed var(--border);border-radius:10px;
      padding:28px 16px;text-align:center;cursor:pointer;
      background:#f8fafc;margin-bottom:10px;
    }
    .m-upload-area i{font-size:36px;color:var(--text-3);margin-bottom:8px;display:block}
    .m-upload-area p{font-size:14px;font-weight:600;color:var(--text-2);margin-bottom:4px}
    .m-upload-area span{font-size:12px;color:var(--text-3)}

    .m-camera-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
    .m-btn{
      padding:12px;border:none;border-radius:10px;font-size:13.5px;font-weight:600;
      cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;
      transition:all .18s;
    }
    .m-btn-primary{background:var(--primary);color:#fff}
    .m-btn-primary:hover{background:var(--primary-d)}
    .m-btn-outline{background:#f1f5f9;color:var(--text-2);border:1px solid var(--border)}

    /* 预览 */
    .m-preview{margin:8px 0;border-radius:10px;overflow:hidden;border:1px solid var(--border)}
    .m-preview img{width:100%;max-height:260px;object-fit:contain;background:#f8fafc;display:block}

    /* 进度 */
    .m-prog{margin:10px 0}
    .m-prog-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:5px}
    .m-prog-fill{height:100%;background:linear-gradient(90deg,#2563eb,#60a5fa);border-radius:3px;width:0%;transition:width .3s}
    .m-prog-text{font-size:11.5px;color:var(--text-3);text-align:center}

    /* 表单 */
    .m-form{display:flex;flex-direction:column;gap:12px}
    .m-field{display:flex;flex-direction:column;gap:5px}
    .m-label{
      font-size:11.5px;font-weight:700;color:var(--text-2);
      display:flex;align-items:center;justify-content:space-between;
    }
    .m-col-tag{font-size:10px;background:var(--primary-l);color:var(--primary);padding:1px 6px;border-radius:4px;font-weight:700}
    .m-input{
      border:1px solid var(--border);border-radius:8px;padding:10px 12px;
      font-size:14px;font-family:inherit;color:var(--text);background:#fff;width:100%;
    }
    .m-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-l)}
    .m-input.ocr-hi{border-color:#f59e0b;background:#fffbeb}
    .m-input-readonly{background:#f1f5f9;cursor:not-allowed;color:var(--text-2)}
    .m-raw{font-size:11.5px;font-family:monospace;min-height:80px;resize:vertical}

    /* Submit */
    .m-submit{
      position:fixed;bottom:0;left:0;right:0;
      background:#fff;border-top:1px solid var(--border);padding:12px 16px;
      display:flex;gap:8px;z-index:200;
      box-shadow:0 -4px 16px rgba(0,0,0,.08);
    }
    .m-btn-save{flex:1;padding:14px;font-size:15px}
    .m-btn-clear{padding:14px 16px;background:#f1f5f9;color:var(--text-2);border:1px solid var(--border)}

    /* OCR indicator */
    .ocr-badge{
      display:inline-flex;align-items:center;gap:5px;
      font-size:10.5px;background:#fef3c7;color:#92400e;
      padding:2px 8px;border-radius:4px;
    }
    /* Toast */
    .m-toast{
      position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(40px);
      background:#1e293b;color:#fff;padding:10px 20px;border-radius:8px;
      font-size:13px;font-weight:500;z-index:9999;opacity:0;transition:all .25s;
      white-space:nowrap;
    }
    .m-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .m-toast.ok{background:#166534}
    .m-toast.err{background:#991b1b}
    .m-toast.warn{background:#92400e}

    /* Sync banner */
    .sync-banner{
      background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;
      padding:8px 12px;font-size:12px;color:#1d4ed8;
      display:flex;align-items:center;gap:8px;margin:0 12px 0;
    }
    .sync-banner a{color:var(--primary);font-weight:700;text-decoration:none}
  </style>
</head>
<body>

<header>
  <div class="m-logo">
    一分三科面料组
    <small>手机录入端 · 实时同步到电脑</small>
  </div>
  <div class="m-hstatus" id="m-status">
    <i class="fa-solid fa-circle-check"></i> 就绪，等待上传图片
  </div>
</header>

<div class="sync-banner" style="margin-top:12px">
  <i class="fa-solid fa-rotate"></i>
  数据自动同步到电脑端 ·
  <a href="index.html" target="_blank">打开电脑端查看 <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
</div>

<!-- 上传区 -->
<div class="m-section">
  <div class="m-title"><i class="fa-solid fa-camera"></i> 拍照 / 上传图片</div>

  <input type="file" id="m-file" accept="image/*" capture="environment" style="display:none" onchange="onMFileChange(event)"/>
  <input type="file" id="m-file-lib" accept="image/*" style="display:none" onchange="onMFileChange(event)"/>

  <div class="m-camera-btns">
    <button class="m-btn m-btn-primary" onclick="document.getElementById('m-file').click()">
      <i class="fa-solid fa-camera"></i> 拍照
    </button>
    <button class="m-btn m-btn-outline" onclick="document.getElementById('m-file-lib').click()">
      <i class="fa-solid fa-images"></i> 相册选择
    </button>
  </div>

  <div id="m-preview-wrap" style="display:none">
    <div class="m-preview"><img id="m-preview-img" src="" alt="预览"/></div>
    <button class="m-btn m-btn-primary" style="width:100%;margin-top:8px" id="m-ocr-btn" onclick="mStartOCR()">
      <i class="fa-solid fa-wand-magic-sparkles"></i> OCR 自动识别
    </button>
    <div id="m-prog" class="m-prog" style="display:none">
      <div class="m-prog-bar"><div id="m-prog-fill" class="m-prog-fill"></div></div>
      <div id="m-prog-text" class="m-prog-text">准备中...</div>
    </div>
  </div>
</div>

<!-- OCR 原文 -->
<div class="m-section" id="m-raw-section" style="display:none">
  <div class="m-title">
    <i class="fa-solid fa-file-lines"></i> OCR 原始文本
    <button class="m-btn m-btn-outline" style="padding:5px 10px;font-size:12px" onclick="mReparse()">重新解析</button>
  </div>
  <textarea class="m-input m-raw" id="m-raw-text" placeholder="识别到的文字显示在这里..."></textarea>
</div>

<!-- 操作人 -->
<div class="m-section">
  <div class="m-title"><i class="fa-solid fa-user"></i> 操作人</div>
  <input class="m-input" id="m-operator" type="text" placeholder="请输入您的姓名"/>
</div>

<!-- 数据表单 -->
<div class="m-section">
  <div class="m-title"><i class="fa-solid fa-table-cells"></i> 面料信息</div>
  <div class="m-form">

    <div class="m-field">
      <div class="m-label">面料描述 <span class="m-col-tag">B列</span></div>
      <input class="m-input" id="m-b" type="text" placeholder="品名、颜色、花型"/>
    </div>

    <div class="m-field">
      <div class="m-label">
        编号 <span class="m-col-tag">C列</span>
        <span style="font-size:11px;color:#94a3b8">1开头→HLWG / 5开头→HLFG</span>
      </div>
      <input class="m-input" id="m-c" type="text" placeholder="输入5位数字自动生成编号"
             oninput="mAutoHLCode(this)"/>
    </div>

    <div class="m-field">
      <div class="m-label">成分 Content <span class="m-col-tag">D列</span></div>
      <input class="m-input" id="m-d" type="text" placeholder="如：60% Cotton 40% Polyester"/>
    </div>

    <div class="m-field">
      <div class="m-label">规格 Density <span class="m-col-tag">E列</span></div>
      <input class="m-input" id="m-e" type="text" placeholder="如：32S×32S"/>
    </div>

    <div class="m-field">
      <div class="m-label">克重 g/m² <span class="m-col-tag">F列</span></div>
      <input class="m-input" id="m-f" type="text" placeholder="如：180"/>
    </div>

    <div class="m-field">
      <div class="m-label">幅宽 M <span class="m-col-tag">G列</span></div>
      <input class="m-input" id="m-g" type="number" step="0.01" placeholder="如：1.60"
             oninput="mCalcInch()"/>
    </div>

    <div class="m-field">
      <div class="m-label">幅宽 英寸 <span class="m-col-tag">H列</span> <i class="fa-solid fa-lock" style="font-size:11px;color:#94a3b8"></i></div>
      <input class="m-input m-input-readonly" id="m-h" type="text" readonly placeholder="自动计算"/>
    </div>

    <div class="m-field">
      <div class="m-label">工厂批号 <span class="m-col-tag">I列</span></div>
      <input class="m-input" id="m-i" type="text" placeholder="如：天强TM0815-198159"/>
    </div>

  </div>
</div>

<!-- 底部保存 -->
<div class="m-submit">
  <button class="m-btn m-btn-outline m-btn-clear" onclick="mClear()">
    <i class="fa-solid fa-eraser"></i>
  </button>
  <button class="m-btn m-btn-primary m-btn-save" onclick="mSave()">
    <i class="fa-solid fa-floppy-disk"></i> 保存并同步
  </button>
</div>

<div class="m-toast" id="m-toast"></div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" async></script>
<script>
/* ---- 状态 ---- */
let mCurrentUrl='';
let mCurrentFile=null;
let mCurrentThumb='';

function onMFileChange(evt){
  const f=evt.target.files[0]; if(!f) return;
  mCurrentFile=f;
  mCurrentUrl=URL.createObjectURL(f);
  document.getElementById('m-preview-img').src=mCurrentUrl;
  document.getElementById('m-preview-wrap').style.display='block';
  mClearFields();
  mStat('就绪，可开始识别');
}

async function mStartOCR(){
  if(!mCurrentUrl){mToast('请先选择图片','warn');return;}
  document.getElementById('m-ocr-btn').disabled=true;
  document.getElementById('m-prog').style.display='block';
  mStat('<i class="fa-solid fa-spinner fa-spin"></i> 识别中...');

  // 压缩缩略图
  mCurrentThumb=await mResizeImg(mCurrentUrl,120);

  try{
    if(!window.Tesseract){ mProgSet(5,'加载引擎...'); await mLoadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js'); }
    mProgSet(10,'初始化...');
    const res=await Tesseract.recognize(mCurrentUrl,'chi_sim+eng',{
      logger:m=>{ if(m.status==='recognizing text') mProgSet(10+Math.floor(m.progress*85),`识别中 ${Math.floor(m.progress*100)}%`); }
    });
    mProgSet(100,'识别完成');
    const raw=res.data.text;
    document.getElementById('m-raw-text').value=raw;
    document.getElementById('m-raw-section').style.display='block';
    mApplyParsed(raw);
    mStat('<i class="fa-solid fa-circle-check"></i> 识别完成，请检查并保存');
    mToast('识别完成，已填充表单','ok');
  }catch(e){
    mStat('识别失败: '+e.message);
    mToast('识别失败','err');
  }finally{
    document.getElementById('m-ocr-btn').disabled=false;
  }
}

function mReparse(){
  const raw=document.getElementById('m-raw-text').value;
  if(!raw){mToast('暂无文本','warn');return;}
  mApplyParsed(raw);
  mToast('已重新解析');
}

function mApplyParsed(raw){
  const parsed=parseOCRFull(raw,{factoryKw:'纺织\n织造\n面料\nTextile\n有限公司'});
  if(parsed.col_b){setMField('m-b',parsed.col_b);}
  if(parsed.col_c){setMField('m-c',parsed.col_c);}
  if(parsed.col_d){setMField('m-d',parsed.col_d);}
  if(parsed.col_e){setMField('m-e',parsed.col_e);}
  if(parsed.col_f){setMField('m-f',parsed.col_f);}
  if(parsed.col_g){setMField('m-g',parsed.col_g); mCalcInch();}
  if(parsed.col_i){setMField('m-i',parsed.col_i);}
}
function setMField(id,val){ const el=document.getElementById(id); el.value=val; el.classList.add('ocr-hi'); }

function mCalcInch(){
  const m=parseFloat(document.getElementById('m-g').value);
  document.getElementById('m-h').value=(!isNaN(m)&&m>0)?calcInchDisplay(m):'';
}
function mAutoHLCode(inp){
  const m=inp.value.match(/^([15]\d{4})$/);
  if(m){ inp.value=resolveHLCode(m[1]); inp.classList.remove('ocr-hi'); }
}

async function mSave(){
  const c=document.getElementById('m-c').value.trim();
  if(!c){mToast('请填写编号','warn');document.getElementById('m-c').focus();return;}
  const op=document.getElementById('m-operator').value.trim()||'手机端';
  localStorage.setItem('mob_operator',op);
  const payload={
    session_id:'mob_'+Date.now(),
    session_time:new Date().toLocaleString('zh-CN'),
    row_index:0,
    img_data_url:mCurrentThumb||'',
    img_name:mCurrentFile?mCurrentFile.name:'',
    col_b:document.getElementById('m-b').value.trim(),
    col_c:c,
    col_d:document.getElementById('m-d').value.trim(),
    col_e:document.getElementById('m-e').value.trim(),
    col_f:document.getElementById('m-f').value.trim(),
    col_g:document.getElementById('m-g').value.trim(),
    col_h:document.getElementById('m-h').value.trim(),
    col_i:document.getElementById('m-i').value.trim(),
    ocr_raw:(document.getElementById('m-raw-text').value||'').slice(0,3000),
    created_at_custom:new Date().toLocaleString('zh-CN'),
  };
  try{
    mStat('<i class="fa-solid fa-spinner fa-spin"></i> 保存中...');
    const res=await fetch('tables/fabric_records',{
      method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)
    });
    if(!res.ok) throw new Error('HTTP '+res.status);
    mToast('✅ 保存成功，已同步到电脑端','ok');
    mStat('<i class="fa-solid fa-circle-check"></i> 已保存并同步');
    mClear();
  }catch(e){
    mStat('保存失败'); mToast('保存失败: '+e.message,'err');
  }
}

function mClear(){
  ['m-b','m-c','m-d','m-e','m-f','m-g','m-h','m-i'].forEach(id=>{
    const el=document.getElementById(id); el.value=''; el.classList.remove('ocr-hi');
  });
  document.getElementById('m-raw-text').value='';
  document.getElementById('m-raw-section').style.display='none';
  document.getElementById('m-preview-wrap').style.display='none';
  document.getElementById('m-prog').style.display='none';
  mCurrentUrl=''; mCurrentFile=null; mCurrentThumb='';
  mStat('已清空，等待新图片');
}
function mClearFields(){
  ['m-b','m-c','m-d','m-e','m-f','m-g','m-h','m-i'].forEach(id=>{ const el=document.getElementById(id); el.value=''; el.classList.remove('ocr-hi'); });
}

function mProgSet(pct,text){
  document.getElementById('m-prog-fill').style.width=pct+'%';
  document.getElementById('m-prog-text').textContent=text;
}
function mStat(html){ document.getElementById('m-status').innerHTML=html; }

function mResizeImg(url,maxPx){
  return new Promise(resolve=>{
    const img=new Image(); img.onload=()=>{
      const c=document.createElement('canvas');
      const sc=Math.min(1,maxPx/Math.max(img.width,img.height));
      c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      resolve(c.toDataURL('image/jpeg',.75));
    }; img.onerror=()=>resolve(''); img.src=url;
  });
}
function mLoadScript(src){
  return new Promise((resolve,reject)=>{
    const s=document.createElement('script'); s.src=src; s.onload=resolve; s.onerror=reject; document.head.appendChild(s);
  });
}
let _mtt=null;
function mToast(msg,type=''){
  const t=document.getElementById('m-toast');
  t.textContent=msg; t.className='m-toast show '+(type||'');
  if(_mtt) clearTimeout(_mtt);
  _mtt=setTimeout(()=>t.classList.remove('show'),3000);
}
// 恢复操作人
document.addEventListener('DOMContentLoaded',()=>{
  const op=localStorage.getItem('mob_operator');
  if(op) document.getElementById('m-operator').value=op;
});
</script>
</body>
</html>
